spring.application.name=fx-mcp-client
server.port=8081
spring.threads.virtual.enabled=true

# Ollama Configuration
spring.ai.model.chat=ollama
spring.ai.model.embedding=ollama
spring.ai.ollama.embedding.options.model=bge-m3
spring.ai.pdf.analysis.enabled=false
#spring.ai.ollama.chat.options.model=qwen3.5:4b
spring.ai.ollama.chat.options.model=llama3.2
spring.ai.ollama.chat.options.temperature=0.6

